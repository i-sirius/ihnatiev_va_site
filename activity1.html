<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <script>
    (() => {
      const savedTheme = localStorage.getItem("site-theme");
      if (savedTheme) {
        document.documentElement.setAttribute("data-theme", savedTheme);
      }
    })();
  </script>
  <link rel="stylesheet" href="css/styles.css">
  <title>Наукова активність</title>
</head>
<body data-page="activity" data-activity-id="1">
  <header class="site-header">
    <h1 data-activity-page-title>Наукова активність</h1>
    <div id="menu"></div>
  </header>

  <main>
    <section class="panel about">
      <h2 data-activity-page-heading>Наукова активність</h2>
      <div class="about-container">
        <div class="about-photo">
          <img src="files/media/about-me-photo.jpg" alt="Фото" data-activity-hero-image>
        </div>
        <div class="about-text" data-activity-paragraphs>
          <p>Опис буде підставлено з config.js.</p>
        </div>
      </div>
    </section>

    <section class="panel">
      <h2>Відео</h2>
      <div class="video-gallery" data-activity-videos></div>
    </section>

    <section class="panel">
      <h2>Фото</h2>
      <div class="gallery" data-activity-gallery></div>
    </section>
  </main>

  <footer>
    <small data-footer>© 2026 Віталій Ігнатьєв</small>
  </footer>
  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
