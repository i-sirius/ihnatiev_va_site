name: Content check

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check-content:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Check content
        run: npm run check:content
